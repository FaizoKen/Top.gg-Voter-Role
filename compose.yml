services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=15
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    environment:
      POSTGRES_DB: voter_role
      POSTGRES_USER: voter_role
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: '64m'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voter_role -d voter_role"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  voter-role:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      # Server
      - HOST=0.0.0.0
      - PORT=${PORT:-3000}
      # Database
      - DATABASE_URL=postgres://voter_role:${POSTGRES_PASSWORD:-changeme}@postgres:5432/voter_role
      # Tuning
      - SYNC_INTERVAL_SECS=${SYNC_INTERVAL_SECS:-43200}
      - PUBLIC_URL=${PUBLIC_URL:-https://your-domain.com}
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
