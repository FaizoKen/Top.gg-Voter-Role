services:
  voter-role:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      # Server
      - HOST=0.0.0.0
      - PORT=${PORT:-3000}
      # Top.gg Webhook
      - TOPGG_WEBHOOK_SECRET=${TOPGG_WEBHOOK_SECRET}
      - TOPGG_TOKEN=${TOPGG_TOKEN}
